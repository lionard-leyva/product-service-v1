spring:
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/productdb
    username: postgres
    password: password
  flyway:
    enabled: true
    url: jdbc:postgresql://localhost:5432/productdb
    user: postgres
    password: password
    schemas: productdb
    clean-disabled: false
    locations:
      - classpath:db/dev/migration
  data:
    r2dbc:
      repositories:
        enabled: true

logging:
  level:
    org.springframework.r2dbc.core: DEBUG
